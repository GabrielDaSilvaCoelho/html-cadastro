<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <img src="ic_logo.png" alt="Logo do sistema" class="logo" />

  <main class="page">
    <section class="container">
      <div class="header">
        <h2>Cadastro</h2>
        <p class="subtitle">Preencha seus dados para criar sua conta</p>
      </div>

      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome completo" />
      </div>

      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="Digite seu CPF" />
      </div>

      <div class="form-group">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" placeholder="Digite seu telefone" />
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" />
      </div>

      <div class="form-group">
        <label for="confirmarSenha">Confirmar senha</label>
        <input type="password" id="confirmarSenha" placeholder="Confirme sua senha" />
      </div>

      <button id="btnCadastrar">Cadastrar</button>

      <p id="msg" class="msg"></p>
    </section>
  </main>

  <script type="module" src="js/script.js"></script>
</body>
</html>
